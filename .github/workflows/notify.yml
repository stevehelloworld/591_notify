name: 591 Community Notifier

on:
  # 每 30 分鐘執行一次（台灣時間白天 08:00–23:00 之間）
  schedule:
    - cron: "*/30 0-15 * * *"  # UTC 0:00-15:30 ≈ 台灣 08:00-23:30
  # 手動觸發
  workflow_dispatch:

permissions:
  contents: write  # 需要寫入權限以提交 seen_ids.json

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          COMMUNITY_ID: ${{ secrets.COMMUNITY_ID }}
        run: python notify.py

      - name: Commit seen_ids.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          git diff --cached --quiet || git commit -m "chore: update seen_ids.json [skip ci]"
          git push
